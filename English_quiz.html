<!DOCTYPE html> 
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz System</title>

<style>
/* Hàng tiêu đề */
#resultTable table thead tr:first-child th{
  background:#6366f1;   /* màu nền */
  color:white;          /* màu chữ */
  border:1px solid #4338ca; /* màu viền */
}

/* Hàng lọc */
#resultTable table thead tr:nth-child(2) th{
  background:#e0e7ff;   /* màu nền */
  border:1px solid #a5b4fc; /* màu viền */
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: "Segoe UI", Tahoma, sans-serif;
  background:#f4f7fb;
  color:#2d3748;
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

h2{
  text-align:center;
  margin-bottom:25px;
  color:#4f46e5;
  font-size:32px;
  font-weight:700;
}

.q-title{
  color:#6366f1;
  font-size:16px;
  font-weight:700;
}

/* FORM TOP */

.top-panel{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  margin-bottom:25px;
}

label{
  font-weight:600;
}

input,
select{
  width:100%;
  padding:12px 15px;
  border:1px solid #dbe2ea;
  border-radius:10px;
  font-size:15px;
  margin-top:6px;
  margin-bottom:15px;
  transition:.2s;
}


/* BUTTON */

button{
  border:none;
  border-radius:12px;
  padding:12px 22px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
  background:linear-gradient(
    135deg,
    #6366f1,
    #8b5cf6
  );
  color:white;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(99,102,241,.3);
}

/* QUIZ CARD */

.question{
  padding:12px 14px;
}

.audio-box{
  margin:10px 0;
  padding:10px;
  background:#eef2ff;
  border-radius:10px;
}

.audio-box audio{
  width:100%;
}

.question > div:nth-child(2){
  margin-bottom:6px;
}



/* bỏ margin thừa của radio */
.question input[type="radio"]{
  margin:0;
  padding:0;
  width:auto;
}

/* bỏ khoảng cách ở đáp án cuối */
.question label:last-child{
  margin-bottom:0;
}

/* TEXT ANSWER */

.question input[type="text"],
.question input:not([type]){
  margin-top:10px;
}

/* RESULT */

.correct{
  margin-top:12px;
  background:#ecfdf5;
  color:#059669;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
}

.wrong{
  margin-top:12px;
  background:#fef2f2;
  color:#dc2626;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
}

/* HR */

hr{
  border:none;
  height:1px;
  background:#e5e7eb;
  margin:25px 0;
}

/* SUBMIT BUTTON */

.submit-wrap{
  text-align:center;
  margin:30px 0;
}

.submit-wrap button{
  min-width:220px;
  font-size:17px;
}

#toast{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
}

.toast{
  min-width:280px;
  padding:14px 18px;
  border-radius:12px;
  color:white;
  font-weight:600;
  margin-bottom:10px;
  box-shadow:0 8px 25px rgba(0,0,0,.15);

  animation:slideIn .3s ease;
}

.toast-success{
  background:#10b981;
}

.toast-error{
  background:#ef4444;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform:translateX(50px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}
.login-row{

.field{

.field label{

<script>
let currentStudent = null;
let viewData = [];
let resultData = [];
let sortState = {key: "",asc: true};
let adminDataLoaded = false;
const API_URL ="https://script.google.com/macros/s/AKfycbxQlZMaeUEsMCF5jHJjNzlhAD6yMD8V93QpiPQdoqI1Ex71_Jx3utKWEFZatNJLo5s/exec";


document.addEventListener("keydown", (e) => {

  // không chạy nếu đang nhập trong input / textarea / select
  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

  if (e.ctrlKey && e.shiftKey && e.code === "KeyH") {
    e.preventDefault();
    openAdmin();
  }
});

async function openAdmin(){

  document.getElementById("adminPanel")
    .style.display = "block";

  renderTable(viewData);

}

function togglePassword(){

  const pass =
    document.getElementById("password");

  const eye =
    document.querySelector(".toggle-password");

  if(pass.type === "password"){

    pass.type = "text";
    eye.textContent = "🚫️";

  }else{

    pass.type = "password";
    eye.textContent = "👁️	";

  }

}

function closeAdmin(){

  document.getElementById("adminPanel")
    .style.display = "none";

}

async function loadScores(force = false){

    if(adminDataLoaded && !force){
        return;
    }

    try{

        const url =
          "https://opensheet.elk.sh/1CuQMGYyWdZKb8XItQgLTbylPuRY73RPGBCPa1E6i8TY/1";

        const res = await fetch(url);

        resultData = await res.json();
        viewData = [...resultData];

        adminDataLoaded = true;

        renderTable(viewData);

    }catch(err){

        console.error(err);

        showToast("✘ Load lỗi","error");

    }
}
function renderTable(data){

let html=`
<table border="1"
style="
width:100%;
border-collapse:collapse;
">

<thead>

<tr>
<th onclick="sortTable('Thời gian')">
Thời gian ${getArrow('Thời gian')}
</th>

<th onclick="sortTable('Họ tên')">
Họ tên ${getArrow('Họ tên')}
</th>

<th onclick="sortTable('Điểm')">
Điểm ${getArrow('Điểm')}
</th>

<th onclick="sortTable('Bài làm')">
Bài làm ${getArrow('Bài làm')}
</th>
</tr>

<tr>

<th>

<div style="display:flex;gap:6px;align-items:center;">

<input
type="date"
id="fDateFrom"
value="${document.getElementById('fDateFrom')?.value || ''}"
onchange="filterTable()"
title="Từ ngày">

<input
type="date"
id="fDateTo"
value="${document.getElementById('fDateTo')?.value || ''}"
onchange="filterTable()"
title="Đến ngày">

</div>

</th>

<th>
<input
id="fName"
value="${document.getElementById('fName')?.value || ''}"
placeholder="Lọc">
</th>

<th>
<input
id="fScore"
value="${document.getElementById('fScore')?.value || ''}"
placeholder="Lọc">
</th>

<th>
<input
id="fLesson"
value="${document.getElementById('fLesson')?.value || ''}"
placeholder="Lọc">
</th>

</tr>

<th colspan="4">


</thead>

<tbody>
`;

data.forEach(r=>{

html+=`
<tr>
<td>${r["Thời gian"]||""}</td>
<td>${r["Họ tên"]||""}</td>
<td>${r["Điểm"]||""}</td>
<td>${r["Bài làm"]||""}</td>
</tr>
`;

});

html+=`
</tbody>
</table>
`;

document.getElementById("tableInfo").innerHTML =
`📊 Đang hiển thị ${data.length} / ${resultData.length} dòng`;
document.getElementById("resultTable").innerHTML =
html;

}

function resetFilter(){

  document.getElementById("fDateFrom").value="";
document.getElementById("fDateTo").value="";
  document.getElementById("fName").value="";
  document.getElementById("fScore").value="";
  document.getElementById("fLesson").value="";

  viewData = [...resultData];

  renderTable(viewData);
}

function getArrow(key){

  if(sortState.key !== key) return "⬍";

  return sortState.asc ? "⬆" : "⬇";
}
function sortTable(key){

  if(sortState.key === key){
    sortState.asc = !sortState.asc;
  }else{
    sortState.key = key;
    sortState.asc = true;
  }

  viewData.sort((a,b)=>{

    let x = a[key] || "";
    let y = b[key] || "";

    const isNumber = !isNaN(x) && !isNaN(y);

    if(isNumber){
      x = Number(x);
      y = Number(y);
    }else{
      x = x.toString().toLowerCase();
      y = y.toString().toLowerCase();
    }

    if(x < y) return sortState.asc ? -1 : 1;
    if(x > y) return sortState.asc ? 1 : -1;
    return 0;
  });

  renderTable(viewData);
}

function parseVNDate(str){

  if(!str) return null;

  const [datePart,timePart] = str.split(" ");

  const [d,m,y] = datePart.split("/");

  return new Date(
    Number(y),
    Number(m)-1,
    Number(d)
  );
}

function filterTable(){

const dateFrom =
document.getElementById("fDateFrom")?.value || "";

const dateTo =
document.getElementById("fDateTo")?.value || "";

const fName =
document.getElementById("fName").value.toLowerCase();

const fScore =
document.getElementById("fScore").value.toLowerCase();

const fLesson =
document.getElementById("fLesson").value.toLowerCase();

let filtered = resultData.filter(r=>{

const timeText =
String(r["Thời gian"] || "");

let passDate = true;

if(dateFrom || dateTo){

const rowDate =
parseVNDate(timeText);
console.log(
  timeText,
  rowDate
);

if(dateFrom){

const startDate = new Date(dateFrom);

startDate.setDate(
  startDate.getDate() - 1
);

passDate =
passDate &&
rowDate >= startDate;

}
if(dateTo){

const endDate =
new Date(dateTo);

endDate.setHours(
23,59,59,999
);

passDate =
passDate &&
rowDate <= endDate;
}

}

return (

passDate &&

String(r["Họ tên"]||"")
.toLowerCase()
.includes(fName)

&&

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ======================
// GET RADIO
// ======================
function getRadio(n){
  const c=document.querySelector(`input[name="${n}"]:checked`);
  return c?c.value:"";
}


function getCorrectAnswerText(q){

  if(!q.answers){
    return (q.correct || "").replace(/\n/g,"<br>");
  }

  // checkbox
  if(Array.isArray(q.correct)){

    return q.answers
      .filter(a => q.correct.includes(a.value))
      .map(a => a.text.replace(/\n/g,"<br>"))
      .join("<br>");
  }

  // radio
  const found =
    q.answers.find(a => a.value === q.correct);

  return found
      ? found.text.replace(/\n/g,"<br>")
      : (q.correct || "").replace(/\n/g,"<br>");
}

function validateAndSubmit(){

    });

  current.forEach((q,index)=>{

    const qName = q.name || q.id;
    const box = document.getElementById("box"+index);

    let empty = false;

    if(q.type === "radio"){

      const checked =
        document.querySelector(
          `input[name="${qName}"]:checked`
        );

      empty = !checked;
    }
    else if(q.type === "checkbox"){

      const checked =
        document.querySelectorAll(
          `input[name="${qName}"]:checked`
        );

      empty = checked.length === 0;
    }
    else{

      const value =
        document
          .getElementById(q.id)
          .value
          .trim();

      empty = !value;
    }

    if(empty){

      notAnswered.push(index+1);

      box.style.border = "2px solid #ef4444";
      box.style.borderRadius = "12px";
      box.style.background = "#fef2f2";
    }

  });

  if(notAnswered.length){

    alert(
      "Bạn chưa làm câu:\n" +
      notAnswered.join(", ")
    );

    document
      .getElementById(
        "box" + (notAnswered[0]-1)
      )
      .scrollIntoView({
        behavior:"smooth",
        block:"center"
      });

    return;
  }

  // =====================
  // BƯỚC 2:
  // KIỂM TRA DẤU CÂU
  // =====================

  const noPunctuation = [];

  current.forEach((q,index)=>{

    // chỉ kiểm tra câu nhập text
    if(
      q.type === "radio" ||
      q.type === "checkbox"
    ){
      return;
    }

    const value =
      document
        .getElementById(q.id)
        .value
        .trim();

    const hasEndMark =
      /(\.\.\.|[.!?])$/.test(value);

    if(!hasEndMark){

      noPunctuation.push(index+1);

      const box =
        document.getElementById(
          "box"+index
        );

      box.style.border =
        "2px solid orange";

      box.style.borderRadius =
        "12px";

      box.style.background =
        "#fff7ed";
    }

  });

  if(noPunctuation.length){

    alert(
      "Thiếu dấu kết thúc câu:\n" +
      noPunctuation.join(", ")
    );

    document
      .getElementById(
        "box" + (noPunctuation[0]-1)
      )
      .scrollIntoView({
        behavior:"smooth",
        block:"center"
      });

    return;
  }

  // =====================
  // OK
  // =====================

  submitQuiz();
}

function getStudentProgress(studentName){

  const total = allLessons.length;

  const doneLessons = new Set();

  resultData.forEach(r=>{

    if((r["Họ tên"] || "").trim() !== studentName){
      return;
    }

    // Chỉ tính bài đạt 10 điểm
    if(Number(r["Điểm"]) !== 10){
      return;
    }

    const lesson =
      (r["Bài làm"] || "").trim();

    if(lesson){
      doneLessons.add(lesson);
    }

  });

  const done = doneLessons.size;

  const percent =
    total
      ? Math.round(done / total * 100)
      : 0;

  return{

    done,

    total,

    percent,

    doneLessons

  };

}

    alert("❌ Số điện thoại phải 10–11 số");
    return;
  }

  // ======================
  // CHECK EMAIL
  // ======================
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    markError(emailEl);
    alert("❌ Email không hợp lệ");
    return;
  }

  // ======================
  // LOADING
  // ======================
  loadingText.textContent = "Đang tạo tài khoản...";
  loading.style.display = "flex";

  try {

const data = {
  type: "register",

  school,
  className,
  course,

  username,
  password,
  phone,
  email,
  address
};

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbxwdsEAG2LVcYxHb6VuLErY9Ynqz0pxWW3U4tQwcXU9w3EJnhHe7ewW8_nSaiaLqRWoYg/exec",
      {
        method: "POST",
        body: JSON.stringify(data)
      }
    );

    const result = await res.json();

    // ======================
    // HANDLE RESPONSE
    // ======================
    if (!result.success) {

      if (result.message === "USERNAME_EXISTS") {
        markError(usernameEl);
        alert("❌ Tên tài khoản đã tồn tại, vui lòng chọn tên khác.");
      } else {
        alert("❌ Đăng ký thất bại, thử lại sau.");
      }

      return;
    }

    // ======================
    // SUCCESS
    // ======================
    alert(
  "✔ Đăng ký thành công!\n" +
  "⏳ Dữ liệu đang được cập nhật.\n" +
  "Bạn có thể đăng nhập sau 5 phút."
);

    closeRegister();

    // clear form
schoolEl.value = "";
classNameEl.value = "";
courseEl.value = "";

usernameEl.value = "";
passwordEl.value = "";
phoneEl.value = "";
emailEl.value = "";
addressEl.value = "";

  } catch (err) {

    console.error(err);
    alert("❌ Lỗi kết nối server, thử lại sau");

  } finally {

    loading.style.display = "none";
    loadingText.textContent = "Đang đăng nhập...";

  }
}

function makeHint(text){

    return text.replace(/[A-Za-zÀ-ỹ0-9]+/g,function(word){

        return "_".repeat(word.length);

    });

}

function showHint(index){

    const q = current[index];

    const hintBox =
        document.getElementById("hint-" + q.id);

    if(hintBox.style.display === "none"){

        hintBox.style.display = "block";

        hintBox.textContent = makeHint(q.correct);
		requestAnimationFrame(()=>{

    const textarea =
        document.getElementById(q.id);
		textarea.placeholder = "";

    textarea.style.height = "auto";

    textarea.style.height =
        hintBox.scrollHeight + 24 + "px";

});

        updateHint(q.id,index);

}else{

    hintBox.style.display = "none";

    const textarea =
        document.getElementById(q.id);

    textarea.placeholder = "Nhập đáp án...";

}

}

function updateHint(id,index){

    const q = current[index];

const hintBox =
    document.getElementById("hint-" + id);

// Chỉ cập nhật khi đã bấm nút Gợi ý
if(hintBox.style.display === "none"){
    return;
}

    const user =
        document.getElementById(id).value;

    let result = "";

    const answer = q.correct;

    for(let i=0;i<answer.length;i++){

        const a = answer[i];

        const u = user[i];

        if(a === "\n"){
            result += "\n";
            continue;
        }

        if(".,?!:;'-".includes(a)){
            result += a;
            continue;
        }

if(a === " "){

    result += " ";

}else{

    result += (u ? u : "_");

}

    }

    hintBox.textContent = result;
	const textarea =
    document.getElementById(id);

textarea.style.height = "auto";

textarea.style.height =
    hintBox.scrollHeight + 24 + "px";

}
