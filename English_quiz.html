<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Question Bank Editor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",Tahoma,sans-serif;
    background:#f4f7fb;
    color:#2d3748;
    padding:25px;
}

/* ===== HEADER ===== */

h2{
    text-align:center;
    color:#4f46e5;
    margin-bottom:25px;
    font-size:32px;
    font-weight:700;
}

/* ===== TOP BAR ===== */

label{
    font-weight:600;
    color:#374151;
}

select,
input,
textarea{
    width:100%;
    padding:10px 12px;
    border:1px solid #d6dbe6;
    border-radius:10px;
    font-size:14px;
    transition:.2s;
}

select:focus,
input:focus,
textarea:focus{
    outline:none;
    border-color:#6366f1;
    box-shadow:0 0 0 4px rgba(99,102,241,.15);
}

textarea{
    min-height:90px;
    resize:vertical;
}

/* ===== BUTTON ===== */

button{
    border:none;
    border-radius:12px;
    padding:10px 18px;
    cursor:pointer;
    color:white;
    font-weight:600;
    transition:.25s;

    background:linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(99,102,241,.3);
}

.action-btn{
    background:linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );
    width:100%;
}

.action-btn:hover{
    box-shadow:0 8px 20px rgba(239,68,68,.3);
}

/* ===== CONTROL PANEL ===== */

.control-panel{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.control-row{
    display:flex;
    gap:15px;
    align-items:end;
    flex-wrap:wrap;
}

.control-row > div{
    min-width:220px;
    flex:1;
}

/* ===== TABLE ===== */

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;

    background:white;

    border-radius:18px;
    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(0,0,0,.08);
}

th{
    background:
    linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    color:white;

    padding:14px 10px;

    border:1px solid #7c3aed;

    font-size:14px;
}

td{
    border:1px solid #e5e7eb;
    padding:10px;
    vertical-align:top;
}

tbody tr:nth-child(even){
    background:#f9fafb;
}

tbody tr:hover{
    background:#eef2ff;
}

/* ===== COLUMN WIDTH ===== */

.col-stt{width:40px;}
.col-type{width:140px;}
.col-audio{width:120px;}
.col-image{width:120px;}
.col-question{width:260px;}
.col-answers{width:220px;}
.col-correct{width:90px;}
.col-delete{width:70px;}

/* ===== IMAGE ===== */

.preview-image{
    width:100%;
    max-width:120px;
    max-height:120px;

    object-fit:cover;

    border-radius:10px;

    margin-top:8px;

    border:2px solid #dbeafe;
}

/* ===== AUDIO ===== */

.audio-btn{
    margin-top:8px;
    width:100%;
}

audio{
    width:100%;
    margin-top:8px;
}

/* ===== DISABLED ===== */

.disabled-field{
    background:#f3f4f6 !important;
    color:#9ca3af !important;
    cursor:not-allowed;
}

/* ===== FOOT BUTTONS ===== */

.bottom-actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

/* ===== SCROLL TABLE ===== */

.table-wrap{
    overflow:auto;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

    body{
        padding:15px;
    }

    h2{
        font-size:26px;
    }

    .control-row{
        flex-direction:column;
    }

    .control-row > div{
        width:100%;
    }
}

.menu-box{
    display:flex;
    gap:8px;
    align-items:center;
}

.menu-box select{
    flex:1;
}

.menu-btn{
    width:42px;
    height:42px;
    padding:0;
    font-size:18px;
}

.dropdown{
    position:relative;
}

.dropdown-content{

    display:none;

    position:absolute;

    right:0;
    top:100%;

    min-width:180px;

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 12px 30px rgba(0,0,0,.15);

    z-index:100;
}

.dropdown-content a{

    display:block;

    padding:12px 15px;

    cursor:pointer;

    color:#374151;

    text-decoration:none;
}

.dropdown-content a:hover{

    background:#eef2ff;
}

.dropdown:hover .dropdown-content{

    display:block;
}

</style>
</head>
<body>

<h2>🎯 Question Bank Editor</h2>
<input
    type="file"
    id="jsonFile"
    accept=".json"
    hidden>

<button
    type="button"
    onclick="document.getElementById('jsonFile').click()">
    📂 Mở File JSON
</button>
<button onclick="saveToDrive()">
☁ Lưu lên Google Drive
</button>

	
<div class="control-panel">

<div class="control-row">

    <div>
        <label>Unit</label>

        <div class="menu-box">

            <select id="unitSelect"></select>

            <div class="dropdown">

                <button class="menu-btn">⚙</button>

                <div class="dropdown-content">

                    <a onclick="addUnit()">➕ Thêm Unit</a>

                    <a onclick="renameUnit()">✏ Đổi tên Unit</a>

                    <a onclick="deleteUnit()">🗑 Xóa Unit</a>

                </div>

            </div>

        </div>

    </div>

    <div>

        <label>Lesson</label>

        <div class="menu-box">

            <select id="lessonSelect"></select>

            <div class="dropdown">

                <button class="menu-btn">⚙</button>

                <div class="dropdown-content">

                    <a onclick="addLesson()">➕ Thêm Lesson</a>

                    <a onclick="renameLesson()">✏ Đổi tên Lesson</a>

                    <a onclick="deleteLesson()">🗑 Xóa Lesson</a>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<div class="table-wrap">

<table>
<thead>
<tr>
<th class="col-stt">STT</th>
<th class="col-type">Dạng câu hỏi</th>
<th class="col-audio">Audio URL</th>
<th class="col-image">Image URL</th>
<th class="col-question">Câu hỏi</th>
<th class="col-answers">Các đáp án</th>
<th class="col-correct">Đáp án đúng</th>
<th class="col-delete">Xóa</th>
</tr>	
</thead>

<tbody id="questionTable"></tbody>
</table>

</table>

</div>

<div class="bottom-actions">

<button onclick="addQuestion()">
❓ Thêm câu hỏi
</button>

<button onclick="exportData()">
💾 Xuất File.json
</button>

</div>


<script>
let bank = {};
window.onload = () => {
    loadFromDrive();
};

const API ="https://script.google.com/macros/s/AKfycbxQlZMaeUEsMCF5jHJjNzlhAD6yMD8V93QpiPQdoqI1Ex71_Jx3utKWEFZatNJLo5s/exec";

document
.getElementById("jsonFile")
.addEventListener(
    "change",
    loadJsonFile
);

async function loadFromDrive(){

    const res = await fetch(API + "?action=list");
    const list = await res.json();

    bank = {}; // reset sạch

    const units = Object.keys(list);

    if(units.length === 0){
        alert("Không có dữ liệu");
        return;
    }

    // load TẤT CẢ unit + lesson
    for(const unit of units){

        bank[unit] = {};

        for(const lesson of list[unit]){

            const resLesson = await fetch(
                API + "?action=lesson&unit=" + unit + "&lesson=" + lesson
            );

            const data = await resLesson.json();

            bank[unit][lesson] = data;
        }
    }

    init();
}

async function saveToDrive(){

    try{

        const res = await 
fetch(API, {
    method: "POST",
    body: JSON.stringify(bank)
});

const text = await res.text();

console.log(text);

alert(text);

    }catch(err){
        alert("Lỗi kết nối: " + err);
    }
}

function loadJsonFile(event){

    const file =
        event.target.files[0];

    if(!file) return;

    const reader =
        new FileReader();

    reader.onload = function(e){

        bank =
            JSON.parse(
                e.target.result
            );

        init();
    };

    reader.readAsText(file);
}

const unitSelect = document.getElementById("unitSelect");
const lessonSelect = document.getElementById("lessonSelect");
unitSelect.addEventListener("change", loadLessons);
lessonSelect.addEventListener("change", renderTable);


function init(){

    // reset trước
    unitSelect.innerHTML = "";
    lessonSelect.innerHTML = "";

    Object.keys(bank).forEach(unit=>{
        unitSelect.innerHTML += `
            <option value="${unit}">
                ${unit}
            </option>`;
    });

    loadLessons();
}

function loadLessons(){

    lessonSelect.innerHTML="";

    const unit = bank[unitSelect.value];

    if(!unit){
        return;
    }

    Object.keys(unit).forEach(lesson=>{

        lessonSelect.innerHTML += `
        <option value="${lesson}">
            ${lesson}
        </option>`;
    });

    renderTable();
}

function currentData(){

    const unit = bank[unitSelect.value];
    if(!unit) return [];

    const lesson = unit[lessonSelect.value];
    if(!lesson) return [];

    return lesson;
}

function renderTable(){

    const data=currentData();

    const tbody=document.getElementById("questionTable");

    tbody.innerHTML="";

    data.forEach((q,index)=>{

        let answersText="";

        if(Array.isArray(q.answers)){
            answersText=q.answers
            .map(a=>`${a.value}:${a.text}`)
            .join("\n");
        }

const hasAnswers =
    q.type==="radio" ||
    q.type==="checkbox";
	
const correctValue =
Array.isArray(q.correct)
? q.correct.join(",")
: (q.correct || "");

        tbody.innerHTML += `
<tr>

    <td>${index+1}</td>

    <td>

<select onchange="changeQuestionType(${index},this.value)">

    <option value="input"
    ${q.type==="input"?"selected":""}>
    Nhập đáp án
    </option>

    <option value="radio"
    ${q.type==="radio"?"selected":""}>
    Chọn 1 đáp án
    </option>

    <option value="checkbox"
    ${q.type==="checkbox"?"selected":""}>
    Chọn nhiều đáp án
    </option>

</select>

    </td>

    <td>

        <input
        placeholder="Audio URL"
        value="${q.audio||''}"
        onchange="
        currentData()[${index}].audio=this.value;
        renderTable();
        ">

        ${
            q.audio
            ?
            `
            <audio
            id="audio-${index}"
            src="${q.audio}">
            </audio>

            <button
            type="button"
            class="audio-btn"
            onclick="toggleAudio(${index})">
                ▶ Play
            </button>
            `
            :
            ''
        }

    </td>

    <td>

        <input
        placeholder="Image URL"
        value="${q.image||''}"
        onchange="
        currentData()[${index}].image=this.value;
        renderTable();
        ">

        ${
            q.image
            ?
            `
            <img
            src="${q.image}"
            class="preview-image">
            `
            :
            ''
        }

    </td>

    <td>

        <textarea
        onchange="
        currentData()[${index}].title=this.value"
        >${q.title||''}</textarea>

    </td>

    <td>

        <textarea

        ${!hasAnswers ? "disabled" : ""}

        class="${!hasAnswers ? "disabled-field" : ""}"

        placeholder="A:Đáp án 1&#10;B:Đáp án 2&#10;C:Đáp án 3"

        onchange="
        updateAnswers(${index},this.value)
        "

        >${answersText}</textarea>

    </td>

    <td>

<input
placeholder="${
q.type==='checkbox'
? 'Ví dụ: A,C'
: 'Ví dụ: A'
}"
value="${correctValue}"

onchange="
updateCorrect(${index},this.value)
">

    </td>

    <td>

        <button
        type="button"
        class="action-btn"
        onclick="deleteQuestion(${index})">
            Xóa
        </button>

    </td>

</tr>
`;
    });
}

function updateAnswers(index,text){

    const rows=text
    .split("\n")
    .filter(x=>x.trim());

    currentData()[index].answers=
    rows.map(row=>{

        const p=row.split(":");

        return{
            value:p[0].trim(),
            text:p.slice(1).join(":").trim()
        };
    });
}

function updateCorrect(index,value){

    const q = currentData()[index];

    if(q.type==="checkbox"){

        q.correct = value
            .split(",")
            .map(x=>x.trim())
            .filter(x=>x);

    }else{

        q.correct = value.trim();
    }
}

function deleteQuestion(index){

    if(confirm("Xóa câu hỏi này?")){

        currentData().splice(index,1);

        renderTable();
    }
}

function toggleAudio(index){

    const audio =
    document.getElementById(
        "audio-"+index
    );

    const btn =
    event.target;

    if(audio.paused){

        document
        .querySelectorAll("audio")
        .forEach(a=>a.pause());

        document
        .querySelectorAll(".audio-btn")
        .forEach(b=>b.innerText="▶ Play");

        audio.currentTime = 0;
        audio.play();

        btn.innerText = "■ Stop";

    }else{

        audio.pause();
        audio.currentTime = 0;

        btn.innerText = "▶ Play";
    }

    audio.onended = ()=>{
        btn.innerText = "▶ Play";
    };
}

function changeQuestionType(index,type){

    const q = currentData()[index];

    q.type = type;

    if(type==="input"){

        delete q.answers;

        q.correct = "";

    }else{

        if(!Array.isArray(q.answers)){

            q.answers = [
                {text:"",value:"A"},
                {text:"",value:"B"},
                {text:"",value:"C"}
            ];
        }

        if(type==="radio"){

            if(Array.isArray(q.correct)){
                q.correct="";
            }

        }else if(type==="checkbox"){

            if(!Array.isArray(q.correct)){
                q.correct=[];
            }

        }
    }

    renderTable();
}

function addUnit(){

    const unit = prompt("Tên Unit:");

    if(!unit) return;

    if(bank[unit]){
        alert("Unit đã tồn tại");
        return;
    }

    bank[unit] = {
        lesson1:[]
    };

    init();

    unitSelect.value = unit;

    loadLessons();
}

function addLesson(){

    const lesson = prompt("Tên Lesson:");

    if(!lesson) return;

    const unit = unitSelect.value;

    if(bank[unit][lesson]){
        alert("Lesson đã tồn tại");
        return;
    }

    bank[unit][lesson] = [];

    loadLessons();

    lessonSelect.value = lesson;

    renderTable();
}

function renameUnit(){

    const oldName = unitSelect.value;

    const newName = prompt("Tên Unit mới:", oldName);

    if(!newName || newName===oldName) return;

    if(bank[newName]){
        alert("Unit đã tồn tại");
        return;
    }

    bank[newName] = bank[oldName];

    delete bank[oldName];

    init();

    unitSelect.value = newName;

    loadLessons();
}

function renameLesson(){

    const unit = unitSelect.value;

    const oldName = lessonSelect.value;

    const newName = prompt("Tên Lesson mới:", oldName);

    if(!newName || newName===oldName) return;

    if(bank[unit][newName]){
        alert("Lesson đã tồn tại");
        return;
    }

    bank[unit][newName] = bank[unit][oldName];

    delete bank[unit][oldName];

    loadLessons();

    lessonSelect.value = newName;

    renderTable();
}

function deleteUnit(){

    if(Object.keys(bank).length==1){

        alert("Phải còn ít nhất 1 Unit.");

        return;
    }

    if(!confirm("Xóa Unit này?")) return;

    delete bank[unitSelect.value];

    init();
}

function deleteLesson(){

    const unit = unitSelect.value;

    if(Object.keys(bank[unit]).length==1){

        alert("Phải còn ít nhất 1 Lesson.");

        return;
    }

    if(!confirm("Xóa Lesson này?")) return;

    delete bank[unit][lessonSelect.value];

    loadLessons();
}


function addQuestion(){

    const id = "q" + Date.now();

    currentData().push({

        type:"input",

        id:id,

        title:"",

        image:"",

        correct:""

    });

    renderTable();
}

function exportData(){

    const output = JSON.stringify(
        bank,
        null,
        2
    );

    const blob = new Blob(
        [output],
        {
            type:"application/json"
        }
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "English_quiz.json";

    a.click();

    URL.revokeObjectURL(a.href);
}

</script>

</body>
</html>
